name: Pipeline CI/CD para DevOps

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Instalación de dependencias
        run: |
          chmod +x setup_env.sh
          ./setup_env.sh
          pip install pytest

      - name: Ejecutar pruebas unitarias
        run: |
          echo "Ejecutando tests..."
          python -m pytest app/tests/ -v

      - name: Build de Imagen Docker
        run: |
          docker build -t mi-app .

      - name: Verificación de Integridad
        run: |
          docker images
          echo "Pipeline completado: La imagen es válida y ligera."
      
      - name: Levantar el contenedor
        run: |
          # Corremos el contenedor en segundo plano (-d)
          # Mapeamos el puerto 5000 del contenedor al 5000 de la máquina virtual
          # Le asignamos el nombre 'contenedor_prueba'
          docker run -d -p 5000:5000 --name contenedor_prueba mi-app
          
          # Esperamos unos segundos a que la app termine de iniciar
          sleep 10

  monitoring:
    - name: Health Check Simple
      run: sleep 15 && curl -f http://localhost:5000 || (docker logs contenedor_prueba && exit 1)

    - name: Notificación de Estado
      if: always()
      run: |
        echo "Enviando métricas de éxito del despliegue a la plataforma de monitoreo..."
        docker stop contenedor_prueba
        docker rm contenedor_prueba